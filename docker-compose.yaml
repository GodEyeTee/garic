version: "3.8"

services:
  trainer:
    build: .
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - WANDB_API_KEY=${WANDB_API_KEY:-}
    volumes:
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints
      - ./configs:/workspace/configs
    command: python3 pipeline.py --mode train

  paper-trade:
    build: .
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints
    command: >
      python3 -m execution.live.trading_engine
      --mode paper
      --symbol BTCUSDT
      --timeframe 900
      --model checkpoints/rl_agent_final.zip
      --telegram-token ${TELEGRAM_TOKEN:-}
      --telegram-chat ${TELEGRAM_CHAT_ID:-}
    restart: unless-stopped

  live-trade:
    build: .
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints
    command: >
      python3 -m execution.live.trading_engine
      --mode live
      --symbol BTCUSDT
      --timeframe 900
      --model checkpoints/rl_agent_final.zip
      --api-key ${BINANCE_API_KEY}
      --api-secret ${BINANCE_API_SECRET}
      --telegram-token ${TELEGRAM_TOKEN:-}
      --telegram-chat ${TELEGRAM_CHAT_ID:-}
    restart: unless-stopped

  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/workspace/data
    command: streamlit run monitoring/live/dashboard.py --server.port 8501 --server.address 0.0.0.0
