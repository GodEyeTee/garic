# GARIC Default Configuration — Full Training (Cloud GPU)

project:
  name: garic
  version: 0.1.0

data:
  pairs:
    - BTCUSDT
    - ETHUSDT
  start_date: "2020-01-01"  # Binance Futures bulk data เริ่ม Jan 2020
  end_date: "2026-03-15"    # อัพเดทเมื่อต้องการข้อมูลใหม่
  base_timeframe: "1m"    # ดาวน์โหลดที่ 1m แล้ว aggregate เป็น timeframe อื่น
  timeframes:
    - "1m"
    - "5m"
    - "15m"
    - "1h"
    - "4h"
    - "1d"

  paths:
    raw: "data/raw"
    clean: "data/clean"

  quality:
    zscore_threshold: 3.0           # outlier > 3σ
    max_gap_forward_fill: 300       # forward-fill gap < 5 นาที (วินาที)
    min_exchanges_validation: 3     # cross-validate ต้อง 3+ exchange
    divergence_threshold: 0.005     # flag >0.5% divergence

  binance:
    asset_class: "um"               # USDT-M futures
    base_url: "https://data.binance.vision"
    api_base: "https://fapi.binance.com"
    funding_rate_limit: 1000        # records per request

  sentiment:
    fear_greed_url: "https://api.alternative.me/fng/?limit=0&format=json"

  onchain:
    defillama_base: "https://api.llama.fi"

trading:
  candle_timeframe: "15m"           # timeframe หลักสำหรับ decision
  max_position_pct:
    major: 0.05                     # 5% equity สำหรับ BTC/ETH
    alt: 0.02                       # 2% equity สำหรับ altcoin
  kelly_fraction: 0.25              # Quarter Kelly
  risk_per_trade: 0.02              # 2% max risk per trade
  leverage: 1                       # 1x default (เปลี่ยนเป็น 3-5x สำหรับ production)
  maintenance_margin: 0.005         # 0.5% Binance BTC
  min_trade_pct: 0.02              # 2% minimum position change
  monthly_server_cost_usd: 100.0    # fixed infra cost charged against equity
  periods_per_day: 96               # 15m candles per day

training:
  checkpoint_interval: 900          # 15 นาที
  device: "cuda"
  seed: 42
  primary_model: "supervised_catboost"

  rl:
    enabled: false
    algo: "PPO"
    total_timesteps: 400000         # More coverage to reduce flat-policy collapse
    learning_rate: 0.0003
    n_steps: 2000
    batch_size: 250
    n_epochs: 15
    ent_coef: 0.12
    eval_every_steps: 50000
    eval_episodes: 8
    collapse_eval_patience: 4
    collapse_min_steps: 150000
    # Reward v3: equity return after costs + drawdown/turnover penalties
    pnl_reward_scale: 100.0
    drawdown_penalty_scale: 2.0
    turnover_penalty_scale: 0.05
    inactive_episode_penalty: 0.0
    static_position_episode_penalty: 0.0
    balanced_sampling: true
    regime_label_threshold: 0.02
    selection_max_dominant_action_ratio: 0.85
    selection_min_avg_trades_per_episode: 1.5
    selection_min_action_entropy: 0.05

  validation:
    holdout_test_ratio: 0.20
    validation_ratio_within_train: 0.10
    selection_windows: 4
    selection_min_window_bars: 1024
    cpcv_splits: 6
    embargo_pct: 0.01
    n_trials_dsr: 5

  supervised_fallback:
    enabled: true
    model_types: ["catboost", "trend_rule"]
    candidate_pool_size: 48
    recent_train_bars: 48000
    validation_episodes: 10
    validation_seed_runs: 4
    validation_probe_seed_runs: 2
    validation_seed_stride: 500
    min_selection_score: 0.05
    fallback_to_safe_flat: true
    horizon: 64
    min_return_threshold: 0.003
    threshold_quantile: 0.80
    max_train_samples: 120000
    logistic_c: 0.35
    logistic_target_mode: "binary_meta"
    logistic_multi_class: "ovr"
    catboost_iterations: 384
    catboost_depth: 6
    catboost_learning_rate: 0.05
    catboost_l2_leaf_reg: 4.0
    catboost_border_count: 128
    catboost_task_type: "GPU"
    catboost_devices: "0"
    extra_trees_n_estimators: 160
    extra_trees_max_depth: 12
    extra_trees_min_samples_leaf: 32
    min_hold_steps: 8
    max_hold_steps: 64
    reversal_margin: 0.07
    entry_margin: 0.06
    exit_to_flat_margin: 0.04
    stop_loss_threshold: -0.012
    drawdown_exit_threshold: 0.04
    trend_alignment_threshold: 0.0012
    countertrend_margin: 0.06
    relaxed_max_dominant_action_ratio: 0.99
    relaxed_min_avg_trades_per_episode: 0.5
    relaxed_min_action_entropy: 0.0
    confidence_grid: [0.74, 0.76, 0.78, 0.80, 0.82, 0.84]
    long_confidence_grid: [0.72, 0.74, 0.76, 0.78, 0.80, 0.82, 0.84]
    short_confidence_grid: [0.68, 0.70, 0.72, 0.74, 0.76, 0.78, 0.80, 0.82, 0.84]
    anchor_long_confidence_grid: [0.76, 0.78, 0.80, 0.82, 0.84]
    anchor_short_confidence_grid: [0.74, 0.76, 0.78, 0.80, 0.82, 0.84]
    exploration_long_confidence_grid: [0.68, 0.70, 0.72, 0.74, 0.76]
    exploration_short_confidence_grid: [0.66, 0.68, 0.70, 0.72, 0.74, 0.76]
    preserve_top_confidence_grid_count: 3
    regime_confidence_relief: 0.04
    flat_reentry_cooldown_steps: 4
    flat_patience_steps: 0
    flat_patience_threshold_relief: 0.0
    flat_patience_entry_margin_relief: 0.0
    countertrend_threshold_penalty: 0.02
    countertrend_entry_penalty: 0.01
    meta_label_min_edge: 0.0006
    meta_label_edge_margin: 0.0003
    meta_label_exit_edge: 0.0001
    meta_label_min_positive_rate: 0.55
    meta_label_target_edge_threshold: 0.0006
    calibration_min_samples: 96
    calibration_probability_thresholds: [0.40, 0.50, 0.60, 0.70, 0.75, 0.80, 0.82, 0.84, 0.86, 0.88, 0.90]
    calibration_window_count: 4
    calibration_window_min_samples: 12
    calibration_min_active_window_ratio: 0.25
    walkforward_score_weight: 0.20
    walkforward_min_active_ratio: 0.10
    walkforward_inactivity_penalty_scale: 1.00
    walkforward_worst_net_penalty_scale: 4.0
    walkforward_worst_gross_penalty_scale: 3.0
    walkforward_worst_alpha_penalty_scale: 0.50
    walkforward_dominance_penalty_scale: 2.0

  forecast_features:
    crypto_mamba:
      enabled: false
      context_len: 96
      horizon: 4
      sample_step: 15
      d_model: 32
      n_layers: 2
      device: "cuda"
      epochs: 6
      lr: 0.001
      batch_size: 128
      max_samples: 12000
      window_stride: 4
      patience: 2
      min_improvement: 0.002
      eval_batch_size: 1024
      predict_batch_size: 1024
      use_amp: true
      save_path: "checkpoints/crypto_mamba_15m.pt"

  nautilus_validation:
    enabled: true
    use_for_model_selection: true
    evaluate_final_test: true
    subprocess_on_windows: true
    subprocess_timeout_seconds: 240
    subprocess_test_timeout_seconds: 600
    backtest_log_level: "ERROR"
    backtest_bypass_logging: true
    backtest_state_update_interval_bars: 256
    subprocess_state_poll_interval_seconds: 4.0
    cleanup_validation_artifacts: true
    backtest_publish_event_details: false
    backtest_publish_warmup_updates: false
    top_supervised_candidates: 8
    selection_windows: 3
    selection_min_window_bars: 1024
    collapse_probe_bars: 4096
    collapse_probe_min_fraction: 0.75
    collapse_probe_min_flat_ratio: 0.995
    collapse_probe_max_trades: 0
    conservative_fallback_min_score: 0.0
    min_selection_score: 0.0
    selection_min_active_window_ratio: 0.3333333333
    venue: "BINANCE"
    bar_minutes: 15
    history_bars: 384
    request_history_days: 8
    initial_balance_usdt: 10000.0
    leverage: 1.0
    trade_size_pct_of_equity: 1.0
    selection_min_trades: 1.0
    selection_max_dominant_action_ratio: 0.995
