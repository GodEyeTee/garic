# RTX 2060 6GB - lightweight validation config

project:
  name: garic
  version: 0.1.0

data:
  pairs:
    - BTCUSDT
  start_date: "2020-01-01"
  end_date: "2026-03-15"
  base_timeframe: "1m"
  timeframes:
    - "1m"
  subsample_rows: 200000

  paths:
    raw: "data/raw"
    clean: "data/clean"

  quality:
    zscore_threshold: 3.0
    max_gap_forward_fill: 300
    min_exchanges_validation: 3
    divergence_threshold: 0.005

  binance:
    asset_class: "um"
    base_url: "https://data.binance.vision"
    api_base: "https://fapi.binance.com"
    funding_rate_limit: 1000

  sentiment:
    fear_greed_url: "https://api.alternative.me/fng/?limit=0&format=json"

  onchain:
    defillama_base: "https://api.llama.fi"

trading:
  candle_timeframe: "15m"
  max_position_pct:
    major: 0.05
    alt: 0.02
  kelly_fraction: 0.25
  risk_per_trade: 0.02
  leverage: 1
  maintenance_margin: 0.005
  min_trade_pct: 0.02
  monthly_server_cost_usd: 100.0
  periods_per_day: 96

training:
  checkpoint_interval: 300
  device: "cuda"
  seed: 42
  primary_model: "supervised_catboost"

  rl:
    enabled: true                  # was false — fast smoke test now exercises RL too
    algo: "PPO"
    total_timesteps: 10000
    learning_rate: 0.0003
    n_steps: 512                   # 512 / 32 = 16 mini-batches
    batch_size: 32
    n_epochs: 5
    ent_coef: 0.08                 # was 0.12, less collapse-prone
    eval_every_steps: 5000
    eval_episodes: 4
    collapse_eval_patience: 2
    collapse_min_steps: 5000
    # Reward v3.1
    pnl_reward_scale: 100.0
    drawdown_penalty_scale: 2.0
    turnover_penalty_scale: 0.0
    inactive_episode_penalty: 0.5
    static_position_episode_penalty: 0.0
    opp_cost_scale: 0.4
    hold_bonus_scale: 0.5
    sharpe_bonus_scale: 0.3
    balanced_sampling: true
    regime_label_threshold: 0.02
    selection_max_dominant_action_ratio: 0.92
    selection_min_avg_trades_per_episode: 1.0
    selection_min_action_entropy: 0.05

  validation:
    holdout_test_ratio: 0.20
    validation_ratio_within_train: 0.10
    selection_windows: 4
    selection_min_window_bars: 256
    cpcv_splits: 4
    embargo_pct: 0.01
    n_trials_dsr: 1

  supervised_fallback:
    enabled: true
    model_types: ["catboost", "trend_rule"]
    candidate_pool_size: 48
    recent_train_bars: 48000
    validation_episodes: 10
    validation_seed_runs: 4
    validation_probe_seed_runs: 1
    validation_seed_stride: 500
    min_selection_score: 0.05
    fallback_to_safe_flat: true
    horizon: 64
    min_return_threshold: 0.003
    threshold_quantile: 0.80
    max_train_samples: 80000
    logistic_c: 0.35
    logistic_target_mode: "binary_meta"
    logistic_multi_class: "ovr"
    catboost_iterations: 128
    catboost_depth: 5
    catboost_learning_rate: 0.07
    catboost_l2_leaf_reg: 3.0
    catboost_border_count: 96
    catboost_task_type: "GPU"
    catboost_devices: "0"
    extra_trees_n_estimators: 96
    extra_trees_max_depth: 10
    extra_trees_min_samples_leaf: 24
    min_hold_steps: 8
    max_hold_steps: 48
    reversal_margin: 0.07
    entry_margin: 0.06
    exit_to_flat_margin: 0.04
    stop_loss_threshold: -0.010
    drawdown_exit_threshold: 0.035
    trend_alignment_threshold: 0.0012
    countertrend_margin: 0.06
    relaxed_max_dominant_action_ratio: 0.998
    relaxed_min_avg_trades_per_episode: 0.5
    relaxed_min_action_entropy: 0.0
    confidence_grid: [0.35, 0.40, 0.45, 0.50, 0.55]
    long_confidence_grid: [0.35, 0.40, 0.45, 0.50, 0.55]
    short_confidence_grid: [0.35, 0.40, 0.45, 0.50, 0.55]
    anchor_long_confidence_grid: [0.40, 0.50]
    anchor_short_confidence_grid: [0.40, 0.50]
    exploration_long_confidence_grid: [0.35]
    exploration_short_confidence_grid: [0.35]
    preserve_top_confidence_grid_count: 3
    regime_confidence_relief: 0.04
    flat_reentry_cooldown_steps: 0
    flat_patience_steps: 0
    flat_patience_threshold_relief: 0.0
    flat_patience_entry_margin_relief: 0.0
    countertrend_threshold_penalty: 0.02
    countertrend_entry_penalty: 0.01
    meta_label_min_edge: 0.0001
    meta_label_edge_margin: 0.0003
    meta_label_exit_edge: 0.0001
    meta_label_min_positive_rate: 0.51
    meta_label_target_edge_threshold: 0.0001
    calibration_min_samples: 12
    calibration_probability_thresholds: [0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80]
    calibration_window_count: 4
    calibration_window_min_samples: 8
    calibration_min_active_window_ratio: 0.25
    walkforward_score_weight: 0.20
    walkforward_min_active_ratio: 0.10
    walkforward_inactivity_penalty_scale: 0.50
    walkforward_worst_net_penalty_scale: 2.0     # 4.0 → 2.0, less harsh
    walkforward_worst_gross_penalty_scale: 1.5   # 3.0 → 1.5, less harsh
    walkforward_worst_alpha_penalty_scale: 0.50
    walkforward_dominance_penalty_scale: 1.0     # 2.0 → 1.0, primary gate is in trainer

  forecast_features:
    crypto_mamba:
      enabled: false
      context_len: 96
      horizon: 4
      sample_step: 15
      d_model: 32
      n_layers: 2
      device: "cuda"
      epochs: 4
      lr: 0.001
      batch_size: 96
      max_samples: 8000
      window_stride: 4
      patience: 2
      min_improvement: 0.002
      eval_batch_size: 512
      predict_batch_size: 512
      use_amp: true
      save_path: "checkpoints/crypto_mamba_15m.pt"

  nautilus_validation:
    enabled: false
    use_for_model_selection: true
    evaluate_final_test: true
    subprocess_on_windows: true
    subprocess_timeout_seconds: 240
    subprocess_test_timeout_seconds: 300
    backtest_log_level: "ERROR"
    backtest_bypass_logging: true
    backtest_state_update_interval_bars: 128
    subprocess_state_poll_interval_seconds: 4.0
    cleanup_validation_artifacts: true
    backtest_publish_event_details: false
    backtest_publish_warmup_updates: false
    top_supervised_candidates: 8
    selection_windows: 3
    selection_min_window_bars: 256
    collapse_probe_bars: 4096
    collapse_probe_min_fraction: 0.75
    collapse_probe_min_flat_ratio: 0.995
    collapse_probe_max_trades: 0
    conservative_fallback_min_score: 0.0
    min_selection_score: 0.0
    selection_min_active_window_ratio: 0.3333333333
    venue: "BINANCE"
    bar_minutes: 15
    history_bars: 384
    request_history_days: 8
    initial_balance_usdt: 10000.0
    leverage: 1.0
    trade_size_pct_of_equity: 1.0
    selection_min_trades: 1.0
    selection_max_dominant_action_ratio: 0.995

