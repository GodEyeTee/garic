# RTX 2060 6GB — Full Training config
# ใช้ data ทั้งหมด แต่ training steps พอประมาณ
# ประมาณ 30-60 นาที บน RTX 2060

data:
  start_date: "2020-01-01"
  end_date: "2026-04-18"
  pairs:
    - BTCUSDT
    # เทรน BTC ก่อน (ETH เพิ่มทีหลังถ้า BTC OK)

  # ไม่ subsample — ใช้ data เต็ม 3.2M rows
  # subsample_rows: ไม่ต้องตั้ง

trading:
  leverage: 1
  maintenance_margin: 0.005
  min_trade_pct: 0.02
  monthly_server_cost_usd: 100.0
  periods_per_day: 96

training:
  checkpoint_interval: 600   # checkpoint ทุก 10 นาที
  device: "cuda"
  seed: 42
  primary_model: "hybrid"

  rl:
    enabled: true
    algo: "PPO"
    total_timesteps: 1000000
    learning_rate: 0.0001
    n_steps: 2048             # SB3-friendly divisor (2048 / 64 = 32 mini-batches)
    batch_size: 64            # smaller batches → more gradient steps per rollout
    n_epochs: 10              # 15 → 10 to reduce overfitting per rollout
    ent_coef: 0.08            # 0.12 → 0.08 keeps exploration alive without collapse
    eval_every_steps: 50000
    eval_episodes: 8
    collapse_eval_patience: 4
    collapse_min_steps: 200000
    # Reward v3.1 — profitability-driven, no double-penalty.
    pnl_reward_scale: 100.0
    drawdown_penalty_scale: 2.0
    turnover_penalty_scale: 0.0    # LOCKED at 0 — fees already cover churn cost
    inactive_episode_penalty: 0.5  # was 0.0 — penalty for no-trade / >95% flat
    static_position_episode_penalty: 0.0
    opp_cost_scale: 0.4            # NEW: opportunity cost while flat
    hold_bonus_scale: 0.5          # NEW: small reward for holding winners
    sharpe_bonus_scale: 0.3        # NEW: episode-end Sharpe bonus
    balanced_sampling: true
    regime_label_threshold: 0.02
    # Selection gates — slightly relaxed to allow selective traders through
    selection_max_dominant_action_ratio: 0.92   # 0.995 → 0.92 (let collapse gate run)
    selection_min_avg_trades_per_episode: 0.5
    selection_min_action_entropy: 0.05          # 0.01 → 0.05, require visible diversity

  validation:
    holdout_test_ratio: 0.20
    validation_ratio_within_train: 0.10
    selection_windows: 4
    selection_min_window_bars: 1024
    cpcv_splits: 2
    embargo_pct: 0.01
    n_trials_dsr: 1

  supervised_fallback:
    enabled: true
    model_types: ["catboost", "trend_rule"]
    candidate_pool_size: 48
    recent_train_bars: 48000
    validation_episodes: 10
    validation_seed_runs: 4
    validation_probe_seed_runs: 2
    validation_seed_stride: 500
    min_selection_score: -10.0
    fallback_to_safe_flat: false
    horizon: 64
    min_return_threshold: 0.003
    threshold_quantile: 0.80
    max_train_samples: 120000
    logistic_c: 0.35
    logistic_target_mode: "binary_meta"
    logistic_multi_class: "ovr"
    catboost_iterations: 256
    catboost_depth: 6
    catboost_learning_rate: 0.05
    catboost_l2_leaf_reg: 4.0
    catboost_border_count: 128
    catboost_task_type: "GPU"
    catboost_devices: "0"
    extra_trees_n_estimators: 160
    extra_trees_max_depth: 12
    extra_trees_min_samples_leaf: 32
    min_hold_steps: 8
    max_hold_steps: 64
    reversal_margin: 0.07
    entry_margin: 0.06
    exit_to_flat_margin: 0.04
    stop_loss_threshold: -0.012
    drawdown_exit_threshold: 0.04
    trend_alignment_threshold: 0.0012
    countertrend_margin: 0.06
    relaxed_max_dominant_action_ratio: 0.998
    relaxed_min_avg_trades_per_episode: 0.5
    relaxed_min_action_entropy: 0.0
    confidence_grid: [0.35, 0.40, 0.45, 0.50, 0.55]
    long_confidence_grid: [0.35, 0.40, 0.45, 0.50, 0.55]
    short_confidence_grid: [0.35, 0.40, 0.45, 0.50, 0.55]
    anchor_long_confidence_grid: [0.40, 0.50]
    anchor_short_confidence_grid: [0.40, 0.50]
    exploration_long_confidence_grid: [0.35]
    exploration_short_confidence_grid: [0.35]
    preserve_top_confidence_grid_count: 3
    regime_confidence_relief: 0.04
    flat_reentry_cooldown_steps: 0
    flat_patience_steps: 0
    flat_patience_threshold_relief: 0.0
    flat_patience_entry_margin_relief: 0.0
    countertrend_threshold_penalty: 0.02
    countertrend_entry_penalty: 0.01
    meta_label_min_edge: -0.0001
    meta_label_edge_margin: 0.0000
    meta_label_exit_edge: -0.0001
    meta_label_min_positive_rate: 0.40
    meta_label_target_edge_threshold: -0.0001
    calibration_min_samples: 24
    calibration_probability_thresholds: [0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80]
    calibration_window_count: 4
    calibration_window_min_samples: 12
    calibration_min_active_window_ratio: 0.25
    walkforward_score_weight: 0.20
    walkforward_min_active_ratio: 0.10
    walkforward_inactivity_penalty_scale: 0.10
    walkforward_worst_net_penalty_scale: 0.10
    walkforward_worst_gross_penalty_scale: 0.10
    walkforward_worst_alpha_penalty_scale: 0.10
    walkforward_dominance_penalty_scale: 0.10

  forecast_features:
    crypto_mamba:
      enabled: false
      context_len: 96
      horizon: 4
      sample_step: 15
      d_model: 32
      n_layers: 2
      device: "cuda"
      epochs: 6
      lr: 0.001
      batch_size: 128
      max_samples: 12000
      window_stride: 4
      patience: 2
      min_improvement: 0.002
      eval_batch_size: 1024
      predict_batch_size: 1024
      use_amp: true
      save_path: "checkpoints/crypto_mamba_15m.pt"



