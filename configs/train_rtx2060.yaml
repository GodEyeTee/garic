# RTX 2060 6GB — Full Training config
# ใช้ data ทั้งหมด แต่ training steps พอประมาณ
# ประมาณ 30-60 นาที บน RTX 2060

data:
  pairs:
    - BTCUSDT
    # เทรน BTC ก่อน (ETH เพิ่มทีหลังถ้า BTC OK)

  # ไม่ subsample — ใช้ data เต็ม 3.2M rows
  # subsample_rows: ไม่ต้องตั้ง

trading:
  leverage: 1
  maintenance_margin: 0.005
  min_trade_pct: 0.02
  monthly_server_cost_usd: 100.0
  periods_per_day: 96

training:
  checkpoint_interval: 600   # checkpoint ทุก 10 นาที
  device: "cuda"
  seed: 42
  primary_model: "supervised_logreg"

  rl:
    enabled: false
    algo: "PPO"
    total_timesteps: 1000000
    learning_rate: 0.0001
    n_steps: 2000             # = max_episode_steps (PPO เห็นจบ episode ทุก rollout)
    batch_size: 250           # clean divisor of 2000
    n_epochs: 15
    ent_coef: 0.12            # keep exploration alive longer to avoid early collapse
    eval_every_steps: 50000
    eval_episodes: 8
    collapse_eval_patience: 4
    collapse_min_steps: 200000
    # Reward v3: equity return after costs + drawdown/turnover penalties
    pnl_reward_scale: 100.0
    drawdown_penalty_scale: 2.0
    turnover_penalty_scale: 0.05
    inactive_episode_penalty: 0.0
    static_position_episode_penalty: 0.0
    balanced_sampling: true
    regime_label_threshold: 0.02
    # Selection gates — เข้มขึ้นเรื่อง profitability
    selection_max_dominant_action_ratio: 0.85   # was 0.95 — stricter
    selection_min_avg_trades_per_episode: 1.5   # was 2.0 — allow selective trading
    selection_min_action_entropy: 0.05          # was 0.02 — require diversity

  validation:
    holdout_test_ratio: 0.20
    validation_ratio_within_train: 0.10
    selection_windows: 4
    selection_min_window_bars: 4096
    cpcv_splits: 4
    embargo_pct: 0.01
    n_trials_dsr: 1

  supervised_fallback:
    enabled: true
    model_types: ["logreg"]
    recent_train_bars: 48000
    validation_episodes: 10
    validation_seed_runs: 4
    validation_seed_stride: 500
    min_selection_score: 0.25
    fallback_to_safe_flat: true
    horizon: 64
    min_return_threshold: 0.003
    threshold_quantile: 0.80
    max_train_samples: 120000
    logistic_c: 0.35
    extra_trees_n_estimators: 160
    extra_trees_max_depth: 12
    extra_trees_min_samples_leaf: 32
    min_hold_steps: 16
    max_hold_steps: 64
    reversal_margin: 0.08
    entry_margin: 0.10
    exit_to_flat_margin: 0.06
    stop_loss_threshold: -0.012
    drawdown_exit_threshold: 0.04
    trend_alignment_threshold: 0.0015
    countertrend_margin: 0.08
    relaxed_max_dominant_action_ratio: 0.99
    relaxed_min_avg_trades_per_episode: 0.5
    relaxed_min_action_entropy: 0.0
    confidence_grid: [0.80, 0.82, 0.84]
    long_confidence_grid: [0.80, 0.82, 0.84]
    short_confidence_grid: [0.82, 0.84, 0.86]
    regime_confidence_relief: 0.03
    flat_reentry_cooldown_steps: 6
    walkforward_score_weight: 0.20
    walkforward_min_active_ratio: 0.25
    walkforward_inactivity_penalty_scale: 1.50
    walkforward_worst_net_penalty_scale: 4.0
    walkforward_worst_gross_penalty_scale: 3.0
    walkforward_worst_alpha_penalty_scale: 0.50
    walkforward_dominance_penalty_scale: 3.0

  forecast_features:
    crypto_mamba:
      enabled: false
      context_len: 96
      horizon: 4
      sample_step: 15
      d_model: 32
      n_layers: 2
      device: "cuda"
      epochs: 6
      lr: 0.001
      batch_size: 128
      max_samples: 12000
      window_stride: 4
      patience: 2
      min_improvement: 0.002
      eval_batch_size: 1024
      predict_batch_size: 1024
      use_amp: true
      save_path: "checkpoints/crypto_mamba_15m.pt"

  nautilus_validation:
    enabled: true
    use_for_model_selection: true
    evaluate_final_test: true
    subprocess_on_windows: true
    top_supervised_candidates: 2
    collapse_probe_bars: 4096
    collapse_probe_min_flat_ratio: 0.995
    collapse_probe_max_trades: 0
    min_selection_score: 0.0
    venue: "BINANCE"
    bar_minutes: 15
    history_bars: 160
    request_history_days: 3
    initial_balance_usdt: 10000.0
    leverage: 1.0
    trade_size_pct_of_equity: 1.0
    selection_min_trades: 1.0
    selection_max_dominant_action_ratio: 0.995
